# Rule-based location filter (Layer 1 in scorer.py).
# If a listing's location/region field matches ANY of these strings
# (case-insensitive substring match), it is dropped BEFORE reaching the AI.
#
# PHILOSOPHY (updated): Layer 1 now ONLY hard-drops roles that are DEFINITELY not
# applyable for a remote worker in Morocco (UTC+0/+1) — onsite/hybrid, and roles
# that clearly require US/Canada legal work authorization or a far-timezone
# residency. Everything with nuance — Europe, EMEA, UK, EU, single European
# countries, "EST overlap", Africa/MENA — is deliberately LEFT for Gemini (Layer
# 2), which now knows the candidate can work Europe/EMEA/Africa/MENA/EOR/contractor
# roles. This avoids silently discarding jobs she could actually apply to.

restricted:
  # Not remote at all — she needs fully remote.
  - "onsite"
  - "on-site"
  - "on site"
  - "hybrid"

  # United States — needs US work authorization / physical presence she lacks.
  - "us only"
  - "u.s. only"
  - "usa only"
  - "united states only"
  - "us-only"
  - "us based"
  - "us-based"
  - "based in the us"
  - "must be located in the us"
  - "authorized to work in the us"
  - "us work authorization"
  - "us citizens"
  - "green card"

  # Canada — needs Canadian work authorization.
  - "canada only"
  - "canadian only"
  - "canada-based"

  # Far-timezone / residency-locked regions that genuinely exclude her.
  # (European single-countries, UK, and EU/EMEA are intentionally NOT here —
  #  they overlap her timezone and are often EOR/contractor-friendly, so the AI
  #  judges them case by case.)
  - "india only"
  - "australia only"
  - "brazil only"
  - "mexico only"
  - "argentina only"
  - "philippines only"
  - "latam only"
