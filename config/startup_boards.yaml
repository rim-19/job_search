# Startup / company job boards — free public JSON APIs (no key needed).
# Each provider is queried PER COMPANY (there's no global search), so this is a
# curated list. All slugs below were verified to return live listings.
#
# To add a company: find its careers page. If the URL contains
#   boards.greenhouse.io/<slug>      -> add under greenhouse
#   jobs.lever.co/<slug>             -> add under lever
#   jobs.ashbyhq.com/<slug>          -> add under ashby
# then drop {name, slug} here. Dead/renamed slugs are skipped gracefully.
#
# The collector keeps only REMOTE-looking listings (remote / anywhere / EMEA /
# Europe / Africa / worldwide) to cut onsite noise before scoring.

