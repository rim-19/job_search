# Keyword hints for the job search.
# These are LIGHT hints — the real fit judgment is done by Gemini in scorer.py.

# Tech stack pulled from the CV. A listing mentioning any of these is a plus.
preferred_stack:
  - python
  - javascript
  - typescript
  - html
  - css
  - react
  - react.js
  - next.js
  - nextjs
  - node
  - node.js
  - express
  - langchain
  - java
  - c#
  - full stack
  - fullstack
  - frontend
  - front-end
  - front end
  - backend
  - back-end
  - web developer
  - software developer
  - software engineer
  - ai
  - llm
  - nlp
  - automation

# Seniority we want. Roles clearly above these are down-weighted by the AI.
seniority_include:
  - junior
  - entry
  - entry-level
  - entry level
  - graduate
  - grad
  - intern
  - internship
  - trainee
  - associate
  - "0-2 years"
  - "1-2 years"
  - beginner

# Hard seniority exclusions — if a title screams this, it is almost never a fit.
seniority_exclude:
  - senior
  - staff
  - principal
  - lead
  - "10+ years"
  - "8+ years"
  - "7+ years"
  - "6+ years"
  - "5+ years"
  - architect
  - head of
  - director
  - manager
  - vp

remote_required: true

# ---------------------------------------------------------------------------
# Broadened query strategy (item 1 of the upgrade).
#
# `search_variants` = the human-facing, Google-Alert-style phrases. They are the
# canonical broad-net queries. Because they use quotes / OR / boolean phrasing
# they are ideal for Google Alerts but too strict for simple job-board search
# params. The collector automatically SIMPLIFIES each into plain keywords
# (strips quotes/OR/AND) before querying APIs that accept a search term, then
# merges + dedupes all results.
#
# No "visa sponsorship" terms on purpose — the target is fully-remote work from
# Morocco, not relocation. The worldwide / EOR / international-contractor terms
# below are the correct remote-from-anywhere equivalent.
# ---------------------------------------------------------------------------
search_variants:
  - '"remote full stack developer" junior'
  - '"entry level developer" "work from anywhere"'
  - '"junior full stack developer" React Node.js remote'
  - '"remote JavaScript developer" junior'
  - '"Next.js developer" remote junior'
  - '"AI automation developer" remote junior'
  - '"remote NLP developer" entry level'
  - '"remote Python developer" "entry level"'
  - '"junior Python developer" remote hiring'
  - '"remote developer" "no experience required"'
  - '"remote developer" "recent graduate"'
  - '"remote developer" "0-1 years experience"'
  - '"remote developer internship" hiring'
  - '"remote developer" "worldwide" hiring'
  - '"remote developer" "Africa" OR "MENA" hiring'
  - '"remote developer" "no location restriction"'
  - '"remote developer" "employer of record"'
  - '"remote developer" "international contractor"'

# How many simplified variants to actually fire per search-capable API each run
# (bounds runtime + politeness). 0 = use all.
max_search_queries: 8
