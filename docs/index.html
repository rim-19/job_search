<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎀 Rim's Job Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%80%3C/text%3E%3C/svg%3E" />
  <!-- jsPDF for client-side "Save as PDF" (no backend) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
</head>
<body>
  <header class="hero">
    <div class="hero-top">
      <svg class="kitty" viewBox="0 0 200 170" width="54" height="46" role="img" aria-label="kitty">
        <ellipse cx="100" cy="95" rx="78" ry="66" fill="#fff" stroke="#e58cae" stroke-width="4"/>
        <path d="M40 55 L28 18 L72 42 Z" fill="#fff" stroke="#e58cae" stroke-width="4"/>
        <path d="M160 55 L172 18 L128 42 Z" fill="#fff" stroke="#e58cae" stroke-width="4"/>
        <ellipse cx="72" cy="95" rx="6.5" ry="10" fill="#333"/>
        <ellipse cx="128" cy="95" rx="6.5" ry="10" fill="#333"/>
        <ellipse cx="100" cy="108" rx="8" ry="6" fill="#f7b733"/>
        <g stroke="#333" stroke-width="3" stroke-linecap="round">
          <line x1="18" y1="90" x2="52" y2="86"/><line x1="16" y1="102" x2="52" y2="100"/><line x1="18" y1="114" x2="52" y2="112"/>
          <line x1="182" y1="90" x2="148" y2="86"/><line x1="184" y1="102" x2="148" y2="100"/><line x1="182" y1="114" x2="148" y2="112"/>
        </g>
        <g transform="translate(150 52)">
          <path d="M0 0 L-22 -14 L-22 14 Z" fill="#ff5fa2" stroke="#d43d80" stroke-width="2.5"/>
          <path d="M0 0 L22 -14 L22 14 Z" fill="#ff5fa2" stroke="#d43d80" stroke-width="2.5"/>
          <circle cx="0" cy="0" r="7" fill="#ff8dc0" stroke="#d43d80" stroke-width="2.5"/>
        </g>
      </svg>
      <div class="hero-title">
        <h1>Rim's Job Board</h1>
        <p class="tagline">junior · remote · worldwide 💌</p>
      </div>
      <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">⚙️</button>
    </div>

    <div class="stats" id="stats">
      <div class="stat"><span class="num" id="stat-total">–</span><span class="lbl">scanned</span></div>
      <div class="stat good"><span class="num" id="stat-keepers">–</span><span class="lbl">good 🌸</span></div>
      <div class="stat"><span class="num" id="stat-fresh">–</span><span class="lbl">fresh 🌟</span></div>
      <div class="stat"><span class="num" id="stat-new">–</span><span class="lbl">new today 💗</span></div>
    </div>
  </header>

  <!-- Settings drawer (API key + CV, stored only in this browser) -->
  <div id="settings" class="settings" hidden>
    <div class="settings-inner">
      <h2>🔐 Your settings <span class="muted">— saved only in this browser</span></h2>
      <label>Gemini API key <span class="muted">(for generating cover letters — uses your own free quota, never leaves your browser)</span></label>
      <input type="password" id="cfg-key" placeholder="paste your Gemini API key" autocomplete="off" />
      <label>Groq API key <span class="muted">(optional fallback — used automatically if Gemini quota runs out)</span></label>
      <input type="password" id="cfg-groq" placeholder="paste your Groq API key (optional)" autocomplete="off" />
      <label>Your CV text <span class="muted">(used to tailor cover letters)</span></label>
      <textarea id="cfg-cv" rows="6" placeholder="paste your CV text"></textarea>
      <div class="settings-actions">
        <button id="cfg-save" class="btn primary">Save 💾</button>
        <span id="cfg-status" class="muted"></span>
      </div>
      <p class="muted small">Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">aistudio.google.com/app/apikey</a>. Nothing here is uploaded — it stays on your device.</p>
    </div>
  </div>

  <main>
    <section class="controls">
      <input type="search" id="search" placeholder="🔍 search title or company…" />
      <select id="score-filter">
        <option value="6">💗 good matches (6+)</option>
        <option value="8">🌟 top picks (8+)</option>
        <option value="0">🎀 everything</option>
      </select>
      <select id="status-filter">
        <option value="">all statuses</option>
        <option value="Not Applied">Not Applied</option>
        <option value="Applied">Applied</option>
        <option value="Interviewing">Interviewing</option>
        <option value="Rejected">Rejected</option>
        <option value="Saved">Saved</option>
      </select>
      <label class="toggle"><input type="checkbox" id="new-only" /> new today</label>
      <label class="toggle"><input type="checkbox" id="fresh-only" /> fresh only</label>
    </section>

    <div id="cards" class="cards"></div>
    <p id="empty" class="empty" hidden></p>
  </main>

  <footer>
    made with 💗 by a tiny job-hunting robot · <span id="updated"></span>
  </footer>

  <!-- Cover letter modal -->
  <div id="modal" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="modal-title">Cover letter</h3>
        <button id="modal-close" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
