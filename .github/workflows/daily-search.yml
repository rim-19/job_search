name: Daily Job Search

on:
  schedule:
    # 09:00 GMT+1 every day = 08:00 UTC. Cron is always UTC.
    - cron: "0 8 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button

permissions:
  contents: write         # needed to commit jobs.db + jobs.json back

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      - name: Commit updated database & snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🎀 daily job update"
          file_pattern: "data/jobs.db docs/jobs.json"
          commit_user_name: "job-agent-bot"
          commit_user_email: "actions@github.com"
